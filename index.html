<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXUS ONE | AI Go Tutor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body class="dark-theme">
    <div id="app">
      <nav class="navbar">
        <div class="nav-left">
          <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
              <path d="M12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2Z" fill="currentColor" fill-opacity="0.1"/>
              <path d="M12 8V12L15 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <h1>NEXUS ONE <span>| AI Go Tutor</span></h1>
        </div>
        <div class="nav-right">
          <button class="menu-btn">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </nav>

      <main class="main-content">
        <div class="board-column">
          <div class="board-wrapper">
            <canvas id="go-board" width="700" height="700"></canvas>
          </div>
        </div>

        <div class="sidebar-column">
          <div class="tutor-container">
            <div class="speech-bubble">
              <p id="tutor-message">안녕하세요! 저는 AI Tutor 고요정입니다. <br>대국을 시작하시겠어요?</p>
            </div>
            <div class="tutor-character-card">
              <div class="tutor-image">
                <img src="/tutor.png" alt="AI Tutor">
              </div>
              <div class="tutor-info">
                <h3>AI Tutor</h3>
                <p>Go Fairy</p>
              </div>
            </div>
          </div>

          <div class="status-card">
            <div class="status-line">
              <span class="label">AI Engine (WASM) Status:</span>
              <span id="ai-status" class="value status-running">[cite: Running]</span>
            </div>
            <div class="status-line">
              <span class="label">Last GTP Command:</span>
              <span id="last-command" class="value">none</span>
            </div>
            <div class="status-line">
              <span class="label">Analysis:</span>
              <span id="analysis-text" class="value">Pending move...</span>
            </div>
            <div class="analysis-percentage" id="analysis-percentage">
              (cite: 50.0%)
            </div>
          </div>

          <div class="controls-card">
             <div class="turn-indicator">
                <span class="label">현재 차례:</span>
                <span id="current-turn" class="value">흑번 (나)</span>
             </div>
             <button id="reset-btn" class="secondary-btn">대국 초기화</button>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
