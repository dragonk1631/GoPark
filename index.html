<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXUS ONE - AI Go Tutor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  </head>
  <body class="bg-[#121212] text-white">
    <div id="app" class="container mx-auto px-4 py-8">
      <header class="text-center mb-10">
        <h1 class="text-4xl font-semibold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
          NEXUS ONE: AI Go Tutor
        </h1>
        <p class="text-gray-400 mt-2">당신의 바둑 실력을 한 단계 높여줄 스마트 튜터</p>
      </header>

      <main class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
        <!-- 바둑판 영역 -->
        <div class="lg:col-span-2 flex justify-center bg-[#1e1e1e] p-6 rounded-2xl shadow-2xl border border-gray-800">
          <canvas id="go-board" width="600" height="600" class="max-w-full h-auto cursor-pointer"></canvas>
        </div>

        <!-- 튜터 UI 영역 -->
        <div class="flex flex-col gap-6">
          <div id="tutor-card" class="bg-gradient-to-br from-[#252525] to-[#1a1a1a] p-6 rounded-2xl border border-gray-800 shadow-xl">
            <div class="flex items-center gap-4 mb-4">
              <div class="w-16 h-16 rounded-full bg-blue-500 flex items-center justify-center text-3xl shadow-lg shadow-blue-500/20">
                🤖
              </div>
              <div>
                <h2 class="text-xl font-bold">Tutor NEXUS</h2>
                <span class="text-xs text-emerald-400 font-mono">ONLINE</span>
              </div>
            </div>
            
            <div class="bg-[#121212] p-4 rounded-xl border border-gray-800 relative">
              <p id="tutor-message" class="text-gray-300 leading-relaxed italic">
                "안녕! 오늘은 어떤 바둑을 두고 싶니? 판 위의 빈 곳을 클릭해서 시작해보자."
              </p>
              <!-- 말풍선 꼬리 -->
              <div class="absolute -left-2 top-6 w-4 h-4 bg-[#121212] border-l border-t border-gray-800 rotate-[-45deg]"></div>
            </div>
          </div>

          <div id="game-info" class="bg-[#1e1e1e] p-6 rounded-2xl border border-gray-800">
            <h3 class="text-sm uppercase tracking-widest text-gray-500 mb-4">대국 정보</h3>
            <div class="flex justify-between items-center mb-2">
              <span class="text-gray-400">차례</span>
              <span id="current-turn" class="font-bold flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-white border border-gray-400"></span> 흑번 (나)
              </span>
            </div>
            <div class="w-full bg-gray-800 h-px my-4"></div>
            <button id="reset-btn" class="w-full py-3 bg-red-500/10 hover:bg-red-500/20 text-red-500 rounded-xl transition-all font-semibold">
              대국 초기화
            </button>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
